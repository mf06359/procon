# Kali-style two-line prompt for the CP nix-shell.
#   ┌──(user@host)-[~/path]-[git]-(cp:<shell>)
#   └─$
# Selected via $STARSHIP_CONFIG (set by shell.nix). Edit freely.

add_newline = false
format = '''[┌──](bold green)$username$hostname$directory$git_branch$shell
[└─](bold green)$character'''

[username]
show_always = true
style_user = "bold blue"
style_root = "bold red"
format = '[\(](bold green)[$user]($style)'

[hostname]
ssh_only = false
style = "bold blue"
format = '[@$hostname]($style)[\)](bold green)'

[directory]
style = "bold white"
truncation_length = 3
truncate_to_repo = false
format = '[-\[](bold green)[$path]($style)[\]](bold green)'

[git_branch]
style = "bold purple"
format = '[-\[](bold green)[$branch]($style)[\]](bold green)'

[shell]
disabled = false
bash_indicator = "bash"
zsh_indicator = "zsh"
nu_indicator = "nu"
unknown_indicator = "sh"
format = '[-\(](bold green)[cp:$indicator](bold cyan)[\)](bold green)'

[character]
success_symbol = '[\$](bold blue)'
error_symbol = '[\$](bold red)'
